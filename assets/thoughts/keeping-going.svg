<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <style>
    .stroke-main { stroke: var(--foreground); fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .stroke-accent { stroke: var(--glow-4); fill: none; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
    .stroke-muted { stroke: var(--muted); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.5; stroke-dasharray: 6 8; }
    .fill-bg { fill: var(--placeholder); }
  </style>
  <rect width="100%" height="100%" class="fill-bg" />
  
  <line x1="50" y1="0" x2="50" y2="400" class="stroke-muted" />
  <line x1="150" y1="0" x2="150" y2="400" class="stroke-muted" />
  <line x1="250" y1="0" x2="250" y2="400" class="stroke-muted" />
  <line x1="350" y1="0" x2="350" y2="400" class="stroke-muted" />
  <line x1="0" y1="50" x2="400" y2="50" class="stroke-muted" />
  <line x1="0" y1="150" x2="400" y2="150" class="stroke-muted" />
  <line x1="0" y1="250" x2="400" y2="250" class="stroke-muted" />
  <line x1="0" y1="350" x2="400" y2="350" class="stroke-muted" />

  <!-- Mountain Peak lines -->
  <path d="M 60,320 L 220,120 L 340,320" class="stroke-muted" />
  <path d="M 180,170 L 200,160 L 240,180" class="stroke-muted" />
  
  <!-- Ascent pathway (stairs/step climbing style) -->
  <path d="M 80,300 L 120,300 L 120,260 L 160,260 L 160,220 L 200,220 L 200,180 L 240,180" class="stroke-main" />

  <!-- Flag at the summit -->
  <line x1="240" y1="180" x2="240" y2="110" class="stroke-accent" />
  <path d="M 240,110 L 290,125 L 240,140 Z" class="stroke-accent" fill="var(--glow-4)" />

  <!-- Sun/Glow behind the summit -->
  <circle cx="200" cy="120" r="30" class="stroke-accent" stroke-dasharray="4 4" />
</svg>

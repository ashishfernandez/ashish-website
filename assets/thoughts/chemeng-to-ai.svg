<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <style>
    .stroke-main { stroke: var(--foreground); fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .stroke-accent { stroke: var(--glow-1); fill: none; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
    .stroke-muted { stroke: var(--muted); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.5; stroke-dasharray: 6 8; }
    .fill-bg { fill: var(--placeholder); }
  </style>
  <rect width="100%" height="100%" class="fill-bg" />
  
  <line x1="50" y1="0" x2="50" y2="400" class="stroke-muted" />
  <line x1="150" y1="0" x2="150" y2="400" class="stroke-muted" />
  <line x1="250" y1="0" x2="250" y2="400" class="stroke-muted" />
  <line x1="350" y1="0" x2="350" y2="400" class="stroke-muted" />
  <line x1="0" y1="50" x2="400" y2="50" class="stroke-muted" />
  <line x1="0" y1="150" x2="400" y2="150" class="stroke-muted" />
  <line x1="0" y1="250" x2="400" y2="250" class="stroke-muted" />
  <line x1="0" y1="350" x2="400" y2="350" class="stroke-muted" />

  <!-- Chemical Beaker/Flask (Left) -->
  <path d="M 120,160 L 120,180 L 80,260 A 15,15 0 0,0 95,280 L 165,280 A 15,15 0 0,0 180,260 L 140,180 L 140,160" class="stroke-main" />
  <line x1="110" y1="160" x2="150" y2="160" class="stroke-main" />
  <path d="M 90,240 Q 130,260 170,240" class="stroke-muted" />

  <!-- Transition Arrow/Path (Middle) -->
  <path d="M 190,220 Q 230,220 230,180 T 270,180" class="stroke-accent" stroke-dasharray="3 3" />
  <path d="M 260,170 L 275,180 L 260,190" class="stroke-accent" />

  <!-- AI / Digital Nodes (Right) -->
  <circle cx="310" cy="150" r="14" class="stroke-main" />
  <circle cx="310" cy="230" r="14" class="stroke-main" />
  <line x1="310" y1="164" x2="310" y2="216" class="stroke-main" />
  <line x1="275" y1="180" x2="296" y2="155" class="stroke-accent" />
  <line x1="275" y1="180" x2="296" y2="225" class="stroke-accent" />

  <!-- Sparkle in top node -->
  <path d="M 310,140 Q 310,150 300,150 Q 310,150 310,160 Q 310,150 320,150 Q 310,150 310,140 Z" fill="var(--glow-1)" />
</svg>

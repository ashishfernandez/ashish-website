<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <style>
    .stroke-main { stroke: var(--foreground); fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .stroke-accent { stroke: var(--glow-4); fill: none; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
    .stroke-muted { stroke: var(--muted); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; opacity: 0.5; stroke-dasharray: 6 8; }
    .fill-bg { fill: var(--placeholder); }
  </style>
  <rect width="100%" height="100%" class="fill-bg" />
  <!-- Grid background decoration for blueprint/sketch feel -->
  <line x1="50" y1="0" x2="50" y2="400" class="stroke-muted" />
  <line x1="150" y1="0" x2="150" y2="400" class="stroke-muted" />
  <line x1="250" y1="0" x2="250" y2="400" class="stroke-muted" />
  <line x1="350" y1="0" x2="350" y2="400" class="stroke-muted" />
  <line x1="0" y1="50" x2="400" y2="50" class="stroke-muted" />
  <line x1="0" y1="150" x2="400" y2="150" class="stroke-muted" />
  <line x1="0" y1="250" x2="400" y2="250" class="stroke-muted" />
  <line x1="0" y1="350" x2="400" y2="350" class="stroke-muted" />

  <!-- Roadway / Horizon grid -->
  <path d="M 200,160 L 50,340" class="stroke-muted" />
  <path d="M 200,160 L 350,340" class="stroke-muted" />
  <path d="M 200,160 L 200,340" class="stroke-muted" />
  <path d="M 125,250 L 275,250" class="stroke-muted" />

  <!-- Self-driving car sketch -->
  <!-- Main body -->
  <path d="M 110,280 L 120,240 L 280,240 L 290,280 Z" class="stroke-main" />
  <!-- Windshield/Cabin -->
  <path d="M 140,240 L 160,200 L 240,200 L 260,240 Z" class="stroke-main" />
  <!-- Wheels -->
  <rect x="120" y="280" width="40" height="20" rx="6" class="stroke-main" />
  <rect x="240" y="280" width="40" height="20" rx="6" class="stroke-main" />

  <!-- Lidar sensor on roof -->
  <path d="M 185,200 L 185,185 L 215,185 L 215,200 Z" class="stroke-main" />
  <ellipse cx="200" cy="180" rx="20" ry="8" class="stroke-accent" />

  <!-- Sensing beams/radar waves -->
  <path d="M 200,172 A 80,80 0 0,0 120,130" class="stroke-accent" stroke-dasharray="2 4" />
  <path d="M 200,172 A 80,80 0 0,1 280,130" class="stroke-accent" stroke-dasharray="2 4" />
  <path d="M 200,172 A 120,120 0 0,0 80,100" class="stroke-accent" stroke-dasharray="3 5" />
  <path d="M 200,172 A 120,120 0 0,1 320,100" class="stroke-accent" stroke-dasharray="3 5" />
</svg>

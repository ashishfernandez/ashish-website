<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ashish Fernandez — Resume, builds, and thoughts. A personal hub.">
    <title>Ashish Fernandez</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/jpeg" href="assets/favicon.jpg">
</head>
<body>
    <!-- Fluid background glow blobs -->
    <div class="background-glow" aria-hidden="true">
        <div class="glow-blob glow-1"></div>
        <div class="glow-blob glow-2"></div>
        <div class="glow-blob glow-3"></div>
        <div class="glow-blob glow-4"></div>
    </div>

    <div class="page">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <a href="/" class="logo" aria-label="Ashish Fernandez home">AF</a>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
            <div class="header-links">
                <a href="https://github.com/ashishfernandez" target="_blank" rel="noopener noreferrer" class="header-social" id="github-link" aria-label="GitHub">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                </a>
                <a href="https://linkedin.com/in/ashishfernandez" target="_blank" rel="noopener noreferrer" class="header-social" id="linkedin-link" aria-label="LinkedIn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                </a>
            </div>
        </header>

        <!-- Main content -->
        <main class="main">
            <!-- Hero -->
            <section class="hero">
                <div class="hero-text">
                    <h1 class="hero-name">Ashish Fernandez</h1>
                    <p class="hero-tagline">DON'T STOP DOING</p>
                </div>
            </section>

            <!-- Tiles -->
            <section class="tiles-section">
                <div class="tiles-grid" id="tiles-grid">
                    <a href="#" class="tile" id="tile-resume">
                        <div class="tile-image">
                            <img src="assets/resume.jpg" alt="Abstract painting representing resume, experiences and journey">
                        </div>
                        <div class="tile-text">
                            <p class="tile-title">My Resume</p>
                            <p class="tile-desc">Experience, education, and my journey.</p>
                        </div>
                    </a>

                    <a href="#" class="tile" id="tile-builds">
                        <div class="tile-image">
                            <img src="assets/builds.jpg" alt="Abstract painting representing code builds and shipped projects">
                        </div>
                        <div class="tile-text">
                            <p class="tile-title">My Builds</p>
                            <p class="tile-desc">Products and projects I'm working on.</p>
                        </div>
                    </a>

                    <a href="#" class="tile" id="tile-thoughts">
                        <div class="tile-image">
                            <img src="assets/thoughts.jpg" alt="Abstract painting representing personal thoughts and reflections">
                        </div>
                        <div class="tile-text">
                            <p class="tile-title">My Thoughts</p>
                            <p class="tile-desc">Ideas, reflections, and things on my mind.</p>
                        </div>
                    </a>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Ashish Fernandez</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
